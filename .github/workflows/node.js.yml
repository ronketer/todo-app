# The name of this workflow as it appears in the Actions tab of the GitHub repository
name: Node.js CI

# Specifies when this workflow is triggered
# This workflow runs when:
#   - Code is pushed to the main or master branch
#   - A pull request is created or updated against main or master
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Environment variables available to all jobs in this workflow
env:
  NODE_ENV: test

# All jobs that will run in this workflow
jobs:
  # First job: runs the test suite with coverage enforcement
  test:
    name: Run Tests
    # This job runs on the latest Ubuntu Linux runner
    runs-on: ubuntu-latest
    
    # Matrix allows running the same job with different configurations
    # This job will run twice: once with Node 18.x and once with Node 20.x
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    # Steps are executed sequentially in the order listed
    steps:
      # Checkout the repository code so we can run commands against it
      #  "checking out" refers to the process of pulling your Git repository's code from GitHub onto the runner (the server executing your workflow)
      # 'uses:' means "run this pre-built GitHub Action"
      # 'actions/checkout@v4' is an official action that downloads your repo code from GitHub onto the runner
      # '@v4' specifies which version of the action to use
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          # fetch-depth controls how much Git history to download
          # 0 = download ALL commit history (entire Git history)
          # 1 = download only the latest commit (shallow clone - faster but limited history)
          # This is useful when you need to access past commits or Git tags
          fetch-depth: 0
          
      # Install Node.js with the current matrix version
      # This makes the `node` and `npm` commands available
      # 'uses' means: use a pre-built GitHub Action (a reusable script)
      # 'actions/setup-node' is an official GitHub Action that installs Node.js on the runner
      # '@v4' specifies the version of the action to use (v4 is the latest major version)
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          # 'with:' passes configuration parameters to the GitHub Action
          # These are custom options that setup-node supports
          
          # node-version: which version of Node.js to install (18.x or 20.x in this case)
          node-version: ${{ matrix.node-version }}
          
          # cache: 'npm' tells the action to cache npm dependencies for faster builds
          # Without caching, npm install downloads all packages every time (slower)
          # With caching, npm reuses downloaded packages from previous builds (faster)
          cache: 'npm'
          
      # Install project dependencies using npm ci (clean install)
      # npm ci is preferred in CI/CD for reproducible builds
      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: test
          
      # Run the complete test suite and enforce 80% code coverage threshold
      - name: Run test suite & enforce coverage
        run: npm test -- --coverage --passWithNoTests
        env:
          NODE_ENV: test
          MONGO_URI: 'mongodb://localhost:27017/todo-list-api-test'
          JWT_SECRET: 'test-secret-key'
          PORT: 3001
          
      # Upload the coverage report as an artifact for viewing in GitHub UI
      # 'actions/upload-artifact@v4' stores test coverage files so you can download them later from GitHub
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          
      # Display summary message when job completes (regardless of pass/fail)
      - name: Test Results Summary
        if: always()
        run: echo "✅ Test execution completed. Check logs above for results."

  client-build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build React app
        working-directory: client
        run: npm run build